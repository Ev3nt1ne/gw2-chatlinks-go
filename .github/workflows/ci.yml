name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # golangci-lint's binary lags the Go release it's run with; a
          # too-new GOROOT can make it choke type-checking stdlib vendor
          # files gated on a newer `go` build tag than the linter binary
          # itself was built with. Pin to a version known to work with
          # golangci-lint's current release, independent of "stable" used
          # by the build/test jobs below.
          go-version: "1.24"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Pin an explicit golangci-lint version rather than "latest" so the
          # advertised lint job is reproducible and can't break under us when
          # a new release changes defaults or the config schema. The repo's
          # .golangci.yml uses the v2 config schema, so this must be a v2.x
          # release.
          version: v2.12.2

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -race -coverprofile=coverage.out -covermode=atomic
      - name: Coverage summary
        if: runner.os != 'Windows'
        run: go tool cover -func=coverage.out
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.out

  floor:
    # The test matrix above runs on "stable" only, so nothing exercises the
    # module's declared go.mod floor. This job builds and tests against
    # exactly that version (read from go.mod, so the two can't drift), keeping
    # the "go 1.x" directive an honest, CI-verified minimum.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go test ./...

  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Cross-compile CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o /dev/null ./cmd/gw2-chatlinks
