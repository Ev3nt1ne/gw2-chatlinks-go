name: Release

# Tag-triggered: pushing a "v*" tag builds cross-platform binaries, archives,
# and checksums via goreleaser and attaches them to a GitHub release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # needed to create the GitHub release and upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # goreleaser needs full history for the changelog
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
